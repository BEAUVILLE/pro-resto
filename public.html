<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>DIGIY RESTO — Restaurants publiés</title>
<meta name="theme-color" content="#1e7a46"/>
<script>
window.DIGIY_SUPABASE_URL="https://wesqmwjjtsefyjnluosj.supabase.co";
window.DIGIY_SUPABASE_ANON_KEY="sb_publishable_tGHItRgeWDmGjnd0CK1DVQ_BIep4Ug3";
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#1e7a46;--bg2:#0e4226;--bar:#062612;--gold:#facc15;--text:#f0fff5;--muted:rgba(240,255,245,.78);--line:rgba(255,255,255,.16);--soft:rgba(255,255,255,.09)}*{box-sizing:border-box}body{margin:0;min-height:100dvh;background:radial-gradient(700px 430px at 16% 0%,rgba(74,222,128,.20),transparent 58%),linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;font-weight:900;padding:14px}a{color:inherit;text-decoration:none}.wrap{width:min(1080px,100%);margin:auto;display:grid;gap:14px}.hero,.card{border:1px solid var(--line);border-radius:24px;background:var(--soft);padding:18px}.hero{border-color:rgba(250,204,21,.34);background:linear-gradient(135deg,rgba(250,204,21,.14),rgba(34,197,94,.12))}.k{color:#fff0a8;font-size:12px;letter-spacing:.14em;text-transform:uppercase}h1{margin:8px 0;font-size:clamp(42px,13vw,92px);line-height:.86;letter-spacing:-.06em}.lead{color:var(--muted);font-size:20px;line-height:1.25}.grid{display:grid;grid-template-columns:1fr;gap:12px}@media(min-width:780px){.grid{grid-template-columns:repeat(2,1fr)}}.resto{overflow:hidden;padding:0}.cover{min-height:210px;background:#062612;display:grid;place-items:center;color:var(--muted);overflow:hidden}.cover img{width:100%;height:250px;object-fit:cover}.body{padding:16px}.name{font-size:30px;line-height:1.02;font-weight:1000;letter-spacing:-.035em}.tag{color:#fff0a8;margin-top:6px}.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}.chip{border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);border-radius:999px;padding:7px 10px;font-size:12px}.desc{color:var(--muted);line-height:1.45;font-size:15px;margin-top:10px}.menu{margin-top:12px;border:1px solid rgba(250,204,21,.28);border-radius:18px;background:rgba(250,204,21,.08);padding:12px}.menu b{color:#fff0a8}.menuText{white-space:pre-wrap;margin-top:6px;font-size:14px;line-height:1.45}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}.btn{min-height:46px;border-radius:16px;border:1px solid rgba(255,255,255,.16);display:grid;place-items:center;text-align:center;padding:10px;font-weight:1000;background:rgba(255,255,255,.1)}.go{background:linear-gradient(135deg,#22c55e,#facc15);color:#06130e}.empty{color:var(--muted)}
</style>
</head>
<body>
<main class="wrap">
<section class="hero"><div class="k">🍽️ DIGIY RESTO</div><h1>Restaurants</h1><p class="lead">Fiches restaurants validées par DIGIY : présentation, carte, photos, contact direct. Pas d’intermédiaire.</p></section>
<section class="grid" id="grid"><div class="card empty">Chargement des restaurants…</div></section>
</main>
<script>
(function(){
function $(id){return document.getElementById(id)}
function safe(s){return String(s||'').replace(/[<>]/g,'')}
function sb(){return window.supabase.createClient(window.DIGIY_SUPABASE_URL,window.DIGIY_SUPABASE_ANON_KEY,{auth:{persistSession:false,autoRefreshToken:false,detectSessionInUrl:false}})}
function card(r){const phone=String(r.whatsapp||'').replace(/\D/g,'');const wa=phone?'https://wa.me/'+phone:'#';const cover=r.photo_principale_url?'<img src="'+safe(r.photo_principale_url)+'" alt="'+safe(r.nom_restaurant||'Restaurant')+'">':'Photo restaurant';const carte=r.carte_titre||r.carte_texte?'<div class="menu"><b>🍽️ '+safe(r.carte_titre||'Carte du restaurant')+'</b><div class="menuText">'+safe(r.carte_texte||'')+'</div></div>':'';return '<article class="card resto"><div class="cover">'+cover+'</div><div class="body"><div class="name">'+safe(r.nom_restaurant||'Restaurant')+'</div><div class="tag">'+safe(r.slogan||'')+'</div><div class="chips"><span class="chip">'+safe(r.cuisine||'Cuisine')+'</span><span class="chip">'+safe(r.ambiance||'Ambiance')+'</span><span class="chip">'+safe(r.horaires||'Horaires')+'</span></div><div class="desc">'+safe(r.description||'')+'</div><div class="desc">📍 '+safe(r.adresse||'')+'</div>'+carte+'<div class="actions"><a class="btn go" href="'+wa+'" target="_blank" rel="noopener">WhatsApp</a><a class="btn" href="'+safe(r.google_maps_url||'#')+'" target="_blank" rel="noopener">Maps</a><a class="btn" href="'+safe(r.carte_url||r.carte_photo_url||'#')+'" target="_blank" rel="noopener">Carte</a><a class="btn" href="'+safe(r.social_url||'#')+'" target="_blank" rel="noopener">Vidéo</a></div></div></article>'}
async function load(){const {data,error}=await sb().from('digiy_resto_fiches_published').select('*').order('published_at',{ascending:false});if(error){$('grid').innerHTML='<div class="card empty">Erreur : '+safe(error.message)+'</div>';return}if(!data||!data.length){$('grid').innerHTML='<div class="card empty">Aucun restaurant publié pour le moment.</div>';return}$('grid').innerHTML=data.map(card).join('')}
load();
})();
</script>
</body>
</html>
