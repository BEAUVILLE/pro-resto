<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<meta name="theme-color" content="#061b14">
<title>DIGIY PRO RESTO</title>
<style>
html,body{margin:0;min-height:100%;font-family:system-ui;background:#061b14;color:#f4fff8}
body{display:grid;place-items:center;padding:20px}.card{max-width:520px;border:1px solid rgba(255,255,255,.14);border-radius:26px;padding:22px;background:#0b2a1f;text-align:center}
a{display:flex;min-height:52px;margin-top:12px;border-radius:18px;align-items:center;justify-content:center;text-decoration:none;font-weight:1000;background:linear-gradient(135deg,#facc15,#f97316);color:#061b14}
</style>
</head>
<body>
<div class="card">
<h1>🍽️ DIGIY PRO RESTO</h1>
<p>Vérification de l’accès restaurant…</p>
<a href="./pin.html">Ouvrir la porte PIN</a>
</div>
<script>
(function(){
  "use strict";
  const TTL=8*60*60*1000;
  function read(k){try{return JSON.parse(localStorage.getItem(k)||"null")}catch(_){return null}}
  const s=read("DIGIY_RESTO_ACCESS")||read("DIGIY_ACCESS");
  const ts=Number(s?.ts||s?.verified_at||0);
  const fresh=!!(s?.slug&&ts&&Date.now()-ts<TTL);
  location.replace((fresh ? "./cockpit-resto.html" : "./pin.html")+(location.search||""));
})();
</script>
</body>
</html>
