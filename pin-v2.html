<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <title>DIGIY RESTO — Redirection PIN</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#020617;color:#f9fafb;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;padding:18px;text-align:center}
    .card{width:min(420px,100%);border:1px solid rgba(148,163,184,.25);border-radius:24px;padding:22px;background:rgba(255,255,255,.04)}
    .ico{font-size:38px}.msg{margin-top:10px;color:#cbd5e1;font-weight:850;line-height:1.5}.btn{margin-top:14px;display:inline-flex;min-height:44px;align-items:center;justify-content:center;border-radius:999px;padding:10px 14px;border:1px solid rgba(250,204,21,.35);background:rgba(250,204,21,.12);color:#fde68a;text-decoration:none;font-weight:1000}
  </style>
</head>
<body>
  <main class="card">
    <div class="ico">🍽️</div>
    <div class="msg">Ancienne porte PIN détectée.<br>Ouverture du nouveau modèle téléphone + code…</div>
    <a class="btn" id="go" href="./pin.html?v=20260601-phone-pin">Ouvrir maintenant</a>
  </main>
  <script>
    (function(){
      "use strict";
      const old = new URL(location.href);
      const next = new URL("./pin.html", location.href);
      ["phone","tel","numero","slug","s"].forEach(k => {
        const v = old.searchParams.get(k);
        if(v) next.searchParams.set(k, v);
      });
      next.searchParams.set("v", "20260601-phone-pin");
      document.getElementById("go").href = next.toString();
      setTimeout(() => location.replace(next.toString()), 220);
    })();
  </script>
</body>
</html>
