<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <title>DIGIY RESTO — Ouverture cockpit</title>
  <style>
    :root{--bg:#061b14;--bg2:#0a2b1f;--line:rgba(255,255,255,.14);--text:#eafff1;--muted:rgba(234,255,241,.72);--gold:#facc15;--ok:#22c55e}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:18px;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;background:radial-gradient(circle at top left,rgba(250,204,21,.18),transparent 42%),linear-gradient(135deg,var(--bg),var(--bg2));color:var(--text)}
    .card{width:min(520px,94vw);border:1px solid var(--line);border-radius:24px;padding:20px;background:rgba(11,42,31,.94);box-shadow:0 18px 55px rgba(0,0,0,.45);text-align:center}
    .ico{width:56px;height:56px;margin:0 auto 12px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold),#f97316);color:#062015;font-size:28px;font-weight:1000}
    h1{margin:0;font-size:24px;line-height:1.1}.msg{margin-top:10px;color:var(--muted);font-weight:800;line-height:1.5}.ok{color:var(--ok);font-weight:1000}.btn{margin-top:14px;display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:10px 16px;border-radius:999px;border:1px solid rgba(250,204,21,.45);background:rgba(250,204,21,.12);color:#fef3c7;text-decoration:none;font-weight:1000}
  </style>
</head>
<body>
  <main class="card">
    <div class="ico">🍽️</div>
    <h1>Ouverture RESTO</h1>
    <div class="msg"><span class="ok">✅ PIN validé.</span><br>Ouverture du cockpit restaurant…</div>
    <a class="btn" href="./cockpit.html">Ouvrir maintenant</a>
  </main>
  <script>
    (function(){
      "use strict";
      const next = new URL("./cockpit.html", location.href);
      next.search = "";
      next.hash = "";
      setTimeout(() => location.replace(next.toString()), 220);
    })();
  </script>
</body>
</html>
