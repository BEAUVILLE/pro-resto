<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RESTO PRO — Action DIGIY</title>
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#1e7a46">
<style>
:root{--bg:#1e7a46;--bg2:#0e4226;--bar:#062612;--gold:#facc15;--text:#f0fff5;--muted:rgba(240,255,245,.78);--line:rgba(255,255,255,.16);--soft:rgba(255,255,255,.09)}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:radial-gradient(600px 300px at 15% 0,rgba(250,204,21,.16),transparent 60%),linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text);padding:70px 12px 90px;font-weight:900}a{color:inherit;text-decoration:none}.top{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bar);border-bottom:1px solid rgba(250,204,21,.28);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:10}.wrap{width:min(860px,100%);margin:auto;display:grid;gap:12px}.card{border-radius:26px;border:1px solid var(--line);background:var(--soft);padding:16px;box-shadow:0 18px 46px rgba(0,0,0,.22)}.k{color:#fff0a8;font-size:12px;letter-spacing:.14em;text-transform:uppercase}h1{font-size:clamp(44px,14vw,82px);line-height:.88;margin:8px 0;letter-spacing:-.055em}.lead{font-size:17px;line-height:1.38;color:var(--muted)}textarea{width:100%;min-height:150px;border-radius:20px;border:1px solid rgba(250,204,21,.35);background:#062612;color:#fff;padding:14px;font:900 17px system-ui;margin-top:10px}.actions{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-top:10px}.btn{min-height:58px;border-radius:18px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.1);color:#fff;font-weight:1000;display:flex;align-items:center;justify-content:center;text-align:center;padding:10px;text-decoration:none}.go{background:linear-gradient(135deg,#22c55e,#facc15);color:#06130e}.gold{background:#facc15;color:#111}.dark{background:#062612}.msg{white-space:pre-wrap;background:#062612;border:1px solid rgba(250,204,21,.25);border-radius:20px;padding:13px;font-weight:900;line-height:1.42;margin-top:10px}.bar{position:fixed;bottom:0;left:0;right:0;height:76px;background:var(--bar);border-top:1px solid rgba(250,204,21,.24);display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:7px}.bar a{display:grid;place-items:center;text-align:center;border-radius:14px;background:rgba(255,255,255,.07);font-size:11px;color:rgba(240,255,245,.75);text-decoration:none}.bar .on{background:#facc15;color:#06130e}.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:#052e16;border:1px solid #d6a63a;border-radius:18px;padding:12px;display:none;font-weight:950}.mini{font-size:13px;color:var(--muted);line-height:1.45;margin-top:9px}
</style>
</head>
<body>
<header class="top"><a href="./hub.html">← HUB</a><b>RESTO ACTION</b><span>⚡</span></header>
<main class="wrap">
<section class="card"><div class="k">🍽️ RESTO · réception métier</div><h1>Dis l’action.</h1><p class="lead">Une commande, une réservation, une table, un acompte annoncé : DIGIY prépare un brouillon. Le pro valide.</p><textarea id="txt">Client Awa, réservation samedi 20h, 4 personnes, table terrasse, acompte 10000 Wave.</textarea><div class="actions"><button class="btn go" id="listen" type="button">🎙️ Écouter</button><button class="btn" id="prep" type="button">⚡ Préparer</button><button class="btn gold" id="copy" type="button">📋 Copier</button><a class="btn dark" href="https://pro-pay.digiylyfe.com/action.html" target="_blank" rel="noopener">💳 PAY</a></div><p class="mini" id="status">Prêt. Rien n’est confirmé automatiquement.</p></section>
<section class="card"><h2>📋 Brouillon RESTO</h2><div class="msg" id="msg">Aucun brouillon.</div></section>
</main>
<nav class="bar"><a href="./hub.html">HUB</a><a class="on" href="./action.html">Action</a><a href="./oreille.html">Oreille</a><a href="./cockpit.html">Cockpit</a><a href="./pin.html">PIN</a></nav>
<div class="toast" id="toast"></div>
<script>
(function(){
function $(id){return document.getElementById(id)}function toast(m){var t=$('toast');t.textContent=m;t.style.display='block';setTimeout(function(){t.style.display='none'},2200)}
function sessionOk(){var keys=['digiy_resto_session','digiy_resto_guard_session','digiy_guard_resto_session'];for(var i=0;i<keys.length;i++){try{var v=JSON.parse(localStorage.getItem(keys[i])||sessionStorage.getItem(keys[i])||'null');if(v&&v.access_ok&&(!v.expires_at||Date.now()<Number(v.expires_at)))return true}catch(e){}}return false}
if(!sessionOk()){location.replace('./pin.html');return}
function find(raw,words){raw=String(raw||'').toLowerCase();return words.filter(function(w){return raw.indexOf(w)>-1})}
function prepare(){var raw=$('txt').value.trim();var money=(raw.match(/\b\d+[\s.]?\d*\b/g)||[]).join(', ')||'à vérifier';var intents=find(raw,['réservation','commande','table','terrasse','livraison','emporter','acompte','wave','cash','orange']);var msg=['RESTO — brouillon préparé','Texte : '+raw,'Intentions : '+(intents.join(', ')||'à vérifier'),'Montants / chiffres : '+money,'','À vérifier par le pro :','- client','- date / heure','- nombre de personnes ou articles','- table / salle / terrasse','- acompte ou paiement réel','', 'Doctrine : RESTO prépare. Le pro valide. PAY garde seulement l’argent réel. Rien n’est confirmé automatiquement.'].join('\n');$('msg').textContent=msg;try{localStorage.setItem('DIGIY_RESTO_ACTION_LATEST',JSON.stringify({raw:raw,intents:intents,preparedAt:new Date().toISOString()}))}catch(e){}$('status').textContent='Brouillon RESTO préparé.';toast('Brouillon RESTO prêt')}
$('prep').onclick=prepare;$('copy').onclick=function(){prepare();navigator.clipboard&&navigator.clipboard.writeText($('msg').textContent);toast('Copié')};$('listen').onclick=function(){var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){toast('Micro non disponible');return}var r=new SR();r.lang='fr-FR';r.onresult=function(e){$('txt').value=e.results[0][0].transcript;prepare()};r.start();toast('Micro ouvert')};
})();
</script>
</body>
</html>
