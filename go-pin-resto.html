<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#061b14"/>
  <title>DIGIY — GO PIN (PRO-RESTO)</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:system-ui;background:#061b14;color:#eafff1}
    .msg{opacity:.85;font-weight:900}
  </style>
</head>
<body>
  <div class="msg" id="m">Redirection…</div>
<script>
  const u = new URL(location.href);
  const slug = (u.searchParams.get("slug") || "").trim();
  if(!slug){
    document.getElementById("m").textContent = "❌ Slug manquant. Utilise ?slug=resto-...";
  }else{
    location.replace("./pin-resto.html?slug=" + encodeURIComponent(slug));
  }
</script>
</body>
</html>
